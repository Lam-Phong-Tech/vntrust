workflows:
  ios-testflight:
    name: iOS WebView App → TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: "aiverigoods_appstore"

    # Auto-build TAT: da bo block `triggering` → KHONG tu build khi push.
    # Muon build thi bam "Start new build" thu cong tren Codemagic UI.

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.hidequan.webhanggia
      node: 20.19.1
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies & Capacitor
        script: |
          cd mobile_app
          npm install

      - name: Generate iOS Native Project
        script: |
          cd mobile_app
          npx cap add ios
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd mobile_app/ios/App
          pod install

      - name: Set up Code Signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Build iOS Release (.ipa)
        script: |
          cd mobile_app
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"

    artifacts:
      - mobile_app/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - admin@aiverigoods.com

