workflows:
  # ─── Build iOS và gửi lên TestFlight ─────────────────────────────────────
  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.hidequan.webhanggia   # ← Bundle ID từ app.json
      vars:
        EXPO_PUBLIC_API_URL: https://anticounterfeit.test9.io.vn
      node: 20.19.1
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: |
          npm install -g expo-cli@latest eas-cli@latest
          npm ci

      - name: Expo prebuild (generate native iOS project)
        script: |
          npx expo prebuild --clean --platform ios

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Build iOS .ipa for App Store
        script: |
          xcode-project build-ipa \
            --workspace "ios/vntrust.xcworkspace" \
            --scheme "vntrust"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        # Tạo API Key tại: https://appstoreconnect.apple.com/access/api
        # Sau đó thêm vào Codemagic: Settings → Integrations → App Store Connect
        api_key: $APP_STORE_CONNECT_API_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        expire_build_submitted_for_review: true
      email:
        recipients:
          - admin@aiverigoods.com   # ← Đổi thành email của bạn

  # ─── Build Android APK (tuỳ chọn) ────────────────────────────────────────
  android-build:
    name: Android APK
    max_build_duration: 60
    instance_type: linux_x2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    environment:
      node: 20.19.1

    scripts:
      - name: Install dependencies
        script: |
          npm install -g expo-cli@latest
          npm ci

      - name: Expo prebuild Android
        script: |
          npx expo prebuild --clean --platform android

      - name: Build Android APK (debug)
        script: |
          cd android && ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
