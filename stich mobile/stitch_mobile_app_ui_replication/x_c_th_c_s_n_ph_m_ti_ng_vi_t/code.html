<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VNTrust - Xác Thực</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        /* Scanner corners */
        .scanner-corner {
            position: absolute;
            width: 32px;
            height: 32px;
            border-color: #53e2f7;
            border-width: 0;
            opacity: 0.8;
        }
        .scanner-corner-tl { top: 16px; left: 16px; border-top-width: 3px; border-left-width: 3px; border-top-left-radius: 8px; }
        .scanner-corner-tr { top: 16px; right: 16px; border-top-width: 3px; border-right-width: 3px; border-top-right-radius: 8px; }
        .scanner-corner-bl { bottom: 16px; left: 16px; border-bottom-width: 3px; border-left-width: 3px; border-bottom-left-radius: 8px; }
        .scanner-corner-br { bottom: 16px; right: 16px; border-bottom-width: 3px; border-right-width: 3px; border-bottom-right-radius: 8px; }
        
        /* Laser animation simulation (CSS fallback if needed, but requested no animations, so static it is) */
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#402d00",
                        "outline-variant": "#3c494b",
                        "on-primary": "#00363d",
                        "on-background": "#d3e4fa",
                        "on-error": "#690005",
                        "surface-dim": "#041424",
                        "inverse-surface": "#d3e4fa",
                        "on-primary-container": "#004e57",
                        "on-surface": "#d3e4fa",
                        "primary-container": "#26c6da",
                        "on-surface-variant": "#bbc9cc",
                        "on-primary-fixed": "#001f24",
                        "surface-bright": "#2b3a4c",
                        "surface-container-high": "#1b2b3c",
                        "secondary": "#aacae5",
                        "on-tertiary-container": "#5b4200",
                        "primary-fixed": "#98f0ff",
                        "inverse-on-surface": "#223243",
                        "secondary-fixed-dim": "#aacae5",
                        "on-secondary-fixed": "#001e2f",
                        "on-secondary-container": "#99b9d3",
                        "tertiary": "#ffc84b",
                        "tertiary-fixed": "#ffdfa0",
                        "on-error-container": "#ffdad6",
                        "secondary-fixed": "#c9e6ff",
                        "on-primary-fixed-variant": "#004f58",
                        "surface-container-lowest": "#000f1f",
                        "tertiary-container": "#e4ac12",
                        "on-tertiary-fixed-variant": "#5c4300",
                        "inverse-primary": "#006874",
                        "on-tertiary-fixed": "#261a00",
                        "surface-container": "#102131",
                        "surface": "#041424",
                        "on-secondary-fixed-variant": "#2a4a60",
                        "tertiary-fixed-dim": "#f8bd2a",
                        "on-secondary": "#113348",
                        "surface-container-low": "#0c1d2d",
                        "error": "#ffb4ab",
                        "primary-fixed-dim": "#45d8ed",
                        "surface-container-highest": "#263647",
                        "background": "#041424",
                        "surface-tint": "#45d8ed",
                        "error-container": "#93000a",
                        "secondary-container": "#2a4a60",
                        "primary": "#53e2f7",
                        "outline": "#869396",
                        "surface-variant": "#263647"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex flex-col selection:bg-primary selection:text-on-primary">
<!-- TopAppBar -->
<nav class="sticky top-0 z-50 w-full bg-surface-container-low shadow-[0_10px_30px_-15px_rgba(4,20,36,0.5)]">
<div class="flex justify-between items-center px-4 h-16 w-full max-w-md mx-auto">
<!-- Leading Avatar -->
<div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center border border-outline-variant/30">
<span class="material-symbols-outlined text-primary text-[16px]">domain</span>
</div>
<!-- Headline -->
<h1 class="font-headline tracking-tight text-on-surface text-xl font-bold tracking-tighter text-primary">VNTrust</h1>
<!-- Trailing Icon -->
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-highest/50 transition-colors active:scale-95 duration-200 text-slate-400">
<span class="material-symbols-outlined">smart_toy</span>
</button>
</div>
</nav>
<!-- Main Canvas -->
<main class="flex-1 flex flex-col items-center px-4 pt-8 pb-32 w-full max-w-md mx-auto relative z-10">
<!-- Header -->
<div class="w-full mb-8 flex flex-col gap-1 px-2">
<h2 class="font-headline text-[1.5rem] font-bold tracking-tight text-on-background leading-tight">Xác Thực<br/><span class="text-primary">Sản Phẩm</span></h2>
<p class="font-body text-[0.75rem] text-on-surface-variant max-w-[250px]">Quét mã QR trên tem bảo mật hoặc nhập số serial để kiểm tra.</p>
</div>
<!-- Scanner Card (Glassmorphism) -->
<div class="w-full bg-surface-variant/40 backdrop-blur-[20px] rounded-[1.5rem] p-4 border border-outline-variant/20 shadow-lg shadow-surface-container-lowest flex flex-col gap-4 mb-8">
<!-- Viewfinder -->
<div class="relative w-full aspect-square rounded-xl overflow-hidden bg-surface-container-highest flex items-center justify-center">
<!-- Conceptual Camera Feed -->
<img alt="Camera view" class="absolute inset-0 w-full h-full object-cover opacity-30 mix-blend-luminosity" data-alt="abstract close up of dark textured surface with subtle blue lighting suggesting a high tech scanner bed" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBmjJn0UmBAa_kMqSqYcu3uHV5VQs5psUq67xo_M_PFtEDYwcMs3xIufPlRaakA9m93is5n-9Zf2ePCJwVRqd9oBwYZ1huCu8aAWUlsq2LDSc9BEiyEB7w0PToQ_yiVOWUv8i48880w_mBeCbadyiXNpCHd34yJjJbWXqfYxNFOzfWcAiD2C0lDwLKL5F0uUwLT3hw_-0B3QYiyB9zwhLKaEAnpLF2qsjPNp1yFeCznNaTKspYCVfFRymjB4JmDu4wp1vaxt5XYFWc"/>
<!-- Overlay Gradients for Depth -->
<div class="absolute inset-0 bg-gradient-to-b from-surface/80 via-transparent to-surface/80"></div>
<!-- Target Reticle -->
<div class="relative w-[70%] h-[70%] flex items-center justify-center">
<div class="scanner-corner scanner-corner-tl"></div>
<div class="scanner-corner scanner-corner-tr"></div>
<div class="scanner-corner scanner-corner-bl"></div>
<div class="scanner-corner scanner-corner-br"></div>
<!-- Scan Line -->
<div class="absolute top-1/2 left-0 w-full h-[2px] bg-primary shadow-[0_0_12px_2px_rgba(83,226,247,0.6)]"></div>
<span class="material-symbols-outlined text-primary/30 text-[64px]">qr_code</span>
</div>
</div>
<!-- Camera Action -->
<button class="w-full bg-surface-bright/10 backdrop-blur-[15px] border border-outline-variant/20 rounded-xl px-4 py-3 flex items-center justify-center gap-2 text-primary font-label uppercase text-[10px] tracking-widest font-bold hover:bg-surface-container-highest transition-colors active:scale-95">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
                Mở Máy Quét
            </button>
</div>
<!-- Or Divider -->
<div class="w-full flex items-center gap-4 mb-8 px-4 opacity-60">
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent to-outline-variant"></div>
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Hoặc</span>
<div class="h-[1px] flex-1 bg-gradient-to-l from-transparent to-outline-variant"></div>
</div>
<!-- Manual Input Section -->
<div class="w-full flex flex-col gap-4">
<div class="relative w-full">
<input class="w-full bg-surface-container-highest text-on-surface placeholder:text-on-surface-variant border border-outline-variant/10 rounded-xl px-5 py-4 font-headline text-sm focus:ring-0 focus:border-primary/50 focus:bg-surface-container-highest/80 outline-none transition-all shadow-inner" placeholder="Nhập Số Serial" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">pin</span>
</div>
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-[1.5rem] py-4 font-label uppercase text-sm tracking-wider font-bold shadow-[0_4px_20px_-5px_rgba(83,226,247,0.3)] active:scale-[0.98] transition-transform flex justify-center items-center gap-2">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">verified</span>
                Xác thực Hàng chính hãng
            </button>
</div>
<!-- Trust Indicator -->
<div class="mt-auto pt-10 flex flex-col items-center gap-1 opacity-50">
<span class="material-symbols-outlined text-tertiary text-[16px]">lock</span>
<p class="font-label text-[9px] uppercase tracking-widest text-on-surface-variant">Giao thức bảo mật mã hóa</p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-surface/80 backdrop-blur-xl border-t border-primary/20 shadow-[0_-8px_24px_-4px_rgba(83,226,247,0.1)]">
<div class="flex justify-around items-center px-6 pb-6 pt-3 max-w-md mx-auto">
<!-- Item 1: Dashboard (Inactive) -->
<button class="flex flex-col items-center justify-center text-slate-500 hover:text-[#53e2f7] transition-all active:scale-90 duration-150 gap-1 w-16">
<span class="material-symbols-outlined text-[24px]">dashboard</span>
<span class="font-label uppercase text-[10px] tracking-[0.1em] font-bold">Tổng Quan</span>
</button>
<!-- Item 2: Verify (ACTIVE) -->
<button class="flex flex-col items-center justify-center text-[#53e2f7] bg-[#53e2f7]/10 rounded-2xl py-1 px-3 hover:text-[#53e2f7] transition-all active:scale-90 duration-150 gap-1 w-20">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
<span class="font-label uppercase text-[10px] tracking-[0.1em] font-bold">Xác Thực</span>
</button>
<!-- Item 3: Analytics (Inactive) -->
<button class="flex flex-col items-center justify-center text-slate-500 hover:text-[#53e2f7] transition-all active:scale-90 duration-150 gap-1 w-16">
<span class="material-symbols-outlined text-[24px]">query_stats</span>
<span class="font-label uppercase text-[10px] tracking-[0.1em] font-bold">Phân Tích</span>
</button>
<!-- Item 4: Business (Inactive) -->
<button class="flex flex-col items-center justify-center text-slate-500 hover:text-[#53e2f7] transition-all active:scale-90 duration-150 gap-1 w-16">
<span class="material-symbols-outlined text-[24px]">business_center</span>
<span class="font-label uppercase text-[10px] tracking-[0.1em] font-bold">Doanh Nghiệp</span>
</button>
</div>
</nav>
</body></html>
